<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <h2>Calculadora</h2>

<input type="text" id="numero1" placeholder="Número 1">
<br><br>

<input type="text" id="numero2" placeholder="Número 2">
<br><br>

<button onclick="calcular('suma')">+</button>
<button onclick="calcular('resta')">-</button>
<button onclick="calcular('multi')">*</button>
<button onclick="calcular('div')">/</button>

<br><br>

<input type="text" id="resultado" readonly>

<script>

const sumar = (a,b) => a + b
const restar = (a,b) => a - b
const multiplicar = (a,b) => a * b
const dividir = (a,b) => b !== 0 ? a / b : null

const calcular = (tipo) => {

let n1 = document.getElementById("numero1").value
let n2 = document.getElementById("numero2").value

if(n1 === "" || n2 === ""){
Swal.fire("Error","Llena ambos campos","error")
return
}

n1 = parseFloat(n1)
n2 = parseFloat(n2)

if(isNaN(n1) || isNaN(n2)){
Swal.fire("Error","Solo números","error")
return
}

let resultado

if(tipo === "suma") resultado = sumar(n1,n2)
if(tipo === "resta") resultado = restar(n1,n2)
if(tipo === "multi") resultado = multiplicar(n1,n2)
if(tipo === "div"){
resultado = dividir(n1,n2)
if(resultado === null){
Swal.fire("Error","No dividir entre 0","error")
return
}
}

document.getElementById("resultado").value = resultado

}

</script>
</body>
</html>
